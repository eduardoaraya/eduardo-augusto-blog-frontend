<app-template [menu]="{ fixed: true, animation: false, bgblack: true }">
  <div class="bg-black h-[90px]"></div>
  <div class="blog-wrapper pt-[150px]">
    <div class="container mx-auto">
      <div class="grid grid-cols-6">
        <div class="w-full">
          <app-blog-sidebar></app-blog-sidebar>
        </div>
        <div class="w-full col-span-4 min-h-[70vh]">
          <div class="flex flex-col">
            <app-blog-card
              *ngFor="let item of list"
              [post]="item"
            ></app-blog-card>
            <div *ngIf="!list.length && !loading">
              <h4 class="text-center">Não há conteúdo disponível no momento</h4>
            </div>
            <div *ngIf="loading">
              <img src="assets/spinner.gif" width="60px" class="m-auto" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</app-template>
